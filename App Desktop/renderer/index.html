<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/styles/globalStyle.css">
    <link rel="stylesheet" href="assets/styles/index.css">
    <script src="assets/index.js" defer></script>
    <title>Documento</title>
</head>
<body>
    <h1>Olá Mundo</h1>
    <hr>
    <section class="books">
        <h3>José de Alencar</h3>
        <frame-livro
            onclick="configLink(this)"
            data-page="pdfViewer.html"
            data-pdf="pdfs/JA-Iracema.pdf"
        >
            <img
                slot="bookCover"
                src="pdfs/capas/capa_Iracema.jpg"
                alt="capa iracema"
            >
            <span slot="bookName">O Tronco de Ipê</span>
        </frame-livro>
        <frame-livro
            onclick="configLink(this)"
            data-page="pdfViewer.html"
            data-pdf="pdfs/JA-O_guarani.pdf"
        >
            <img slot="bookCover" src="pdfs/capas/capa_O_Gurani.jpg" alt="capa_O_Gurani">
            <span slot="bookName">O Guaraní</span>
        </frame-livro>
    </section>
</body>
</html>
